name: CI/CD Triage Medical CHSA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic
      
      - name: Run API tests
        run: |
          echo "Tests unitaires à implémenter"
          
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t triage-chsa:${{ github.sha }} .
          
      - name: Run container
        run: |
          docker run -d -p 8000:8000 triage-chsa:${{ github.sha }}
          
      - name: Health check
        run: |
          sleep 5
          curl http://localhost:8000/health