[workspace]
name = "poso_logic"
version = "0.1.0"
description = "Fine-tuning LLM pour agent de triage medical CHSA"
authors = ["Damien GUESDON <kisai.dg.slu@gmail.com>"]
platforms = ["linux-64"]
channels = ["conda-forge"]

[dependencies]
python = "3.10.*"
zellij = ">=0.44.1,<0.45"
tree = ">=2.3.2,<3"
watch = ">=4.0.6,<5"
jupyterlab = ">=4.5.7,<5"
protobuf = ">=6.33.5,<7"
flake8 = ">=7.3.0,<8"
black = ">=26.3.1,<27"
isort = ">=8.0.1,<9"
mlflow = ">=2.14.0,<3"
matplotlib = ">=3.8.0,<4"

[target.linux-64.***]
datasets = ">=4.8.4,<5"
spacy = ">=3.8.14,<4"
presidio-analyzer = ">=2.2.360,<3"
presidio-anonymizer = ">=2.2.360,<3"
peft = ">=0.8.0,<1"
scipy = "*"
numpy = ">=1.24.0,<2"
tqdm = "*"
transformers = "==4.51.0"
fastapi = "*"
uvicorn = "*"
torch = ">=2.0.0,<2.6"
accelerate = ">=1.0.0"
trl = "==0.11.4"

[tasks]
download = "python scripts/01_download_datasets.py"
anonymize = "python scripts/02_anonymize.py"
anonymize-fast = "python scripts/02_anonymize_fast.py"
create-sft = "python scripts/03_create_sft_dpo.py"
train-sft = "python scripts/04_train_sft.py"
train-dpo = "python scripts/05_train_dpo.py"
api = "python scripts/06_api.py"
api-dpo = "python scripts/06_api_vllm.py"
evaluate = "python scripts/evaluate_dpo_model.py"
dashboard = "python scripts/mlflow_tracker.py reconstruct && bash start_mlflow_ui.sh"
